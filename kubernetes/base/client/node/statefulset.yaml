apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: client-node
spec:
  selector:
    matchLabels: {}
  serviceName: client-node
  replicas: 1
  template:
    spec:
      containers:
      - name: sleep
        image: zookage-util
        args:
        - sleep
        - inf
        envFrom:
        - configMapRef:
            name: aws-env
        - configMapRef:
            name: hadoop-env
        - configMapRef:
            name: hbase-env
        - configMapRef:
            name: hive-env
        - configMapRef:
            name: ozone-env
        - configMapRef:
            name: spark-env
        - configMapRef:
            name: tez-env
        - configMapRef:
            name: trino-env
        - configMapRef:
            name: zookeeper-env
        env:
        - name: HADOOP_CLASSPATH
          value: $(TEZ_CONF_DIR):$(TEZ_JARS)/*:$(TEZ_JARS)/lib/*
        - name: PATH
          # yamllint disable-line rule:line-length
          value: $(TRINO_HOME)/trino-cli/bin:$(HBASE_HOME)/bin:$(HIVE_HOME)/bin:$(OZONE_HOME)/bin:$(SPARK_HOME)/bin:$(HADOOP_HOME)/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        volumeMounts:
        - name: hadoop-conf
          mountPath: /etc/hadoop/conf
        - name: hbase-conf
          mountPath: /etc/hbase/conf
        - name: hive-conf
          mountPath: /etc/hive/conf
        - name: ozone-conf
          mountPath: /etc/ozone/conf
        - name: spark-conf
          mountPath: /etc/spark/conf
        - name: tez-conf
          mountPath: /etc/tez/conf
        - name: trino-conf
          mountPath: /etc/trino/conf/cli.properties
          subPath: cli.properties
        - name: zookeeper-conf
          mountPath: /etc/zookeeper/conf
        - name: hadoop-src
          mountPath: /opt/hadoop
          readOnly: true
          subPath: opt/hadoop
        - name: hbase-src
          mountPath: /opt/hbase
          readOnly: true
          subPath: opt/hbase-client
        - name: hive-src
          mountPath: /opt/hive
          readOnly: true
          subPath: opt/hive
        - name: ozone-src
          mountPath: /opt/ozone
          readOnly: true
          subPath: opt/ozone
        - name: spark-src
          mountPath: /opt/spark
          readOnly: true
          subPath: opt/spark
        - name: tez-src
          mountPath: /opt/tez
          readOnly: true
          subPath: opt/tez
        - name: trino-src
          mountPath: /opt/trino
          readOnly: true
          subPath: opt/trino
        - name: zookeeper-src
          mountPath: /opt/zookeeper
          readOnly: true
          subPath: opt/zookeeper
        workingDir: /home/zookage
      terminationGracePeriodSeconds: 0
      volumes:
      - name: hadoop-conf
        configMap:
          name: hadoop-conf
      - name: hbase-conf
        configMap:
          name: hbase-conf
      - name: hbase-src
        image:
          reference: zookage-hbase
          pullPolicy: IfNotPresent
      - name: hive-conf
        configMap:
          name: hive-conf
      - name: ozone-conf
        configMap:
          name: ozone-conf
      - name: ozone-src
        image:
          reference: zookage-ozone
          pullPolicy: IfNotPresent
      - name: spark-src
        image:
          reference: zookage-spark
          pullPolicy: IfNotPresent
      - name: spark-conf
        configMap:
          name: spark-conf
      - name: tez-conf
        configMap:
          name: tez-conf
      - name: trino-conf
        configMap:
          name: trino-conf
      - name: zookeeper-conf
        configMap:
          name: zookeeper-conf
      - name: zookeeper-src
        image:
          reference: zookage-zookeeper
          pullPolicy: IfNotPresent
      - name: hadoop-src
        image:
          reference: zookage-hadoop
          pullPolicy: IfNotPresent
      - name: hive-src
        image:
          reference: zookage-hive
          pullPolicy: IfNotPresent
      - name: tez-src
        image:
          reference: zookage-tez
          pullPolicy: IfNotPresent
      - name: trino-src
        image:
          reference: zookage-trino
          pullPolicy: IfNotPresent
  volumeClaimTemplates: []
