apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hive-llap
spec:
  selector:
    matchLabels: {}
  serviceName: hive-llap
  podManagementPolicy: Parallel
  replicas: 0
  template:
    spec:
      initContainers:
      - name: wait-for-metastore
        image: zookage-util
        args:
        - wait-for-rollout
        - statefulset/hive-metastore-server
      - name: wait-for-dns
        image: zookage-util
        args:
        - wait-for-dns
      containers:
      - name: llap
        image: zookage-hive
        workingDir: /mnt
        command:
        - /bin/sh
        - -lc
        args:
        - >-
          exec java
          -Xms512m
          -Xmx1024m
          -Dhttp.maxConnections=5
          -server
          -Djava.net.preferIPv4Stack=true
          --add-opens=java.base/java.lang=ALL-UNNAMED
          --add-opens=java.base/java.net=ALL-UNNAMED
          --add-opens=java.base/java.util=ALL-UNNAMED
          --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
          --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED
          --add-opens=java.base/java.io=ALL-UNNAMED
          --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
          --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
          --add-opens=java.base/java.math=ALL-UNNAMED
          --add-opens=java.base/java.nio=ALL-UNNAMED
          --add-opens=java.base/java.text=ALL-UNNAMED
          --add-opens=java.base/java.time=ALL-UNNAMED
          --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED
          --add-opens=java.base/jdk.internal.reflect=ALL-UNNAMED
          --add-opens=java.sql/java.sql=ALL-UNNAMED
          --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
          --add-opens=java.base/sun.nio.cs=ALL-UNNAMED
          --add-opens=java.base/java.util.regex=ALL-UNNAMED
          --add-opens=java.base/java.security=ALL-UNNAMED
          --add-opens=java.base/sun.security.provider=ALL-UNNAMED
          -XX:+UseNUMA
          -XX:+UseParallelGC
          -Dlog4j.configurationFile=llap-daemon-log4j2.properties
          -classpath
          "/etc/hadoop/conf:/etc/hive/conf:/etc/tez/conf:/opt/hive/lib/*:/opt/tez/*:/opt/tez/lib/*:$(/opt/hadoop/bin/hadoop
          classpath)"
          org.apache.hadoop.hive.llap.daemon.impl.LlapDaemon
        envFrom:
        - configMapRef:
            name: hadoop-env
        - configMapRef:
            name: hive-env
        - configMapRef:
            name: java-env
        - configMapRef:
            name: tez-env
        env:
        - name: LD_LIBRARY_PATH
          value: "/opt/hadoop/lib/native"
        readinessProbe:
          tcpSocket:
            port: 15000
        volumeMounts:
        - name: hadoop-conf
          mountPath: /etc/hadoop/conf
        - name: hive-conf
          mountPath: /etc/hive/conf
        - name: tez-conf
          mountPath: /etc/tez/conf
        - name: mnt
          mountPath: /mnt
        - name: hadoop-src
          mountPath: /opt/hadoop
          readOnly: true
          subPath: opt/hadoop
        - name: tez-src
          mountPath: /opt/tez
          readOnly: true
          subPath: opt/tez
      terminationGracePeriodSeconds: 5
      volumes:
      - name: hadoop-conf
        configMap:
          name: hadoop-conf
      - name: hive-conf
        configMap:
          name: hive-conf
      - name: tez-conf
        configMap:
          name: tez-conf
      - name: mnt
        emptyDir: {}
      - name: hadoop-src
        image:
          reference: zookage-hadoop
          pullPolicy: IfNotPresent
      - name: tez-src
        image:
          reference: zookage-tez
          pullPolicy: IfNotPresent
  volumeClaimTemplates: []
