apiVersion: apps/v1
kind: Deployment
metadata:
  name: tez-ui
spec:
  replicas: 1
  selector:
    matchLabels: {}
  template:
    spec:
      containers:
      - name: tez-ui
        image: tomcat:11.0.18-jdk21-temurin
        readinessProbe:
          tcpSocket:
            port: 8080
        volumeMounts:
        - name: tez-src
          mountPath: /opt/tez
          readOnly: true
          subPath: opt/tez
        - name: tez-src
          mountPath: /usr/local/tomcat/webapps/tez-ui.war
          readOnly: true
          subPath: opt/tez/share/tez-ui.war
      volumes:
      - name: tez-src
        image:
          reference: zookage-tez
          pullPolicy: IfNotPresent
