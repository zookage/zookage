apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hdfs-journalnode
spec:
  replicas: 3
  template:
    spec:
      containers:
      - name: journalnode
        args:
        - journalnode
        - -Ddfs.namenode.shared.edits.dir=$(HADOOP_DFS_NAMENODE_SHARED_EDITS_DIR)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hadoop-env
data:
  HADOOP_DFS_HA_NAMENODES: namenode-0,namenode-1
  HADOOP_DFS_HA_AUTOMATIC_FAILOVER_ENABLED: "true"
  HADOOP_DFS_HA_FENCING_METHODS: shell(true)
  HADOOP_DFS_NAMENODE_SHARED_EDITS_DIR: "qjournal://hdfs-journalnode-0.hdfs-journalnode:8485;\
    hdfs-journalnode-1.hdfs-journalnode:8485;\
    hdfs-journalnode-2.hdfs-journalnode:8485/zookage"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hdfs-namenode
spec:
  replicas: 2
  template:
    spec:
      initContainers:
      - name: wait-for-zookeeper
        image: zookage-util
        args:
        - wait-for-rollout
        - statefulset/zookeeper-server
      - name: format-zookeeper
        image: zookage-hadoop
        command:
        - /bin/bash
        args:
        - -c
        - |
          index=${POD_NAME##*-}
          if [[ "$index" -eq 0 ]]; then
            "${HADOOP_HOME}/bin/hdfs" zkfc -formatZK
          fi
        envFrom:
        - configMapRef:
            name: hadoop-env
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        securityContext:
          runAsUser: 1011
          runAsGroup: 1010
        volumeMounts:
        - name: hadoop-conf
          mountPath: /etc/hadoop/conf
        - name: mnt
          mountPath: /mnt
      - name: wait-for-journalnode
        image: zookage-util
        args:
        - wait-for-rollout
        - statefulset/hdfs-journalnode
      - name: format
        args:
        - -c
        - |
          shared_edits_option="-Ddfs.namenode.shared.edits.dir=${HADOOP_DFS_NAMENODE_SHARED_EDITS_DIR}"
          index=${POD_NAME##*-}
          if [[ "$index" -eq 0 ]]; then
            "${HADOOP_HOME}/bin/hdfs" namenode "${shared_edits_option}" -format -force
          else
            "${HADOOP_HOME}/bin/hdfs" namenode "${shared_edits_option}" -bootstrapStandby -force
          fi
      containers:
      - name: namenode
        args:
        - namenode
        - -Ddfs.namenode.shared.edits.dir=$(HADOOP_DFS_NAMENODE_SHARED_EDITS_DIR)
      - name: zkfc
        image: zookage-hadoop
        command:
        - $(HADOOP_HOME)/bin/hdfs
        args:
        - zkfc
        envFrom:
        - configMapRef:
            name: hadoop-env
        securityContext:
          runAsUser: 1011
          runAsGroup: 1010
        volumeMounts:
        - name: hadoop-conf
          mountPath: /etc/hadoop/conf
        - name: mnt
          mountPath: /mnt
